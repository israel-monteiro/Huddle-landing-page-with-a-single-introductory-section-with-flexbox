<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Huddle landing page with single introductory section</title>

  <link rel="stylesheet" href="./src/css/font-awesome.min.css">
  <link rel="stylesheet" href="./src/css/reset.css">
  <link rel="stylesheet" href="./src/css/variables.css">
  <link rel="stylesheet" href="./src/css/style.css">
  <link rel="stylesheet" href="./src/css/responsive.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
</head>
<body>
  <header class="header">
    <a href="/">
      <img src="./src/images/logo.svg" alt="Huddle — Home" class="logo">
    </a>
  </header>
  <main class="main">
    <section class="hero">
      <img src="./src/images/illustration-mockups.svg" alt="Illustration of the Huddle platform interface">
      <div class="hero-content">
        <div class="description">
          <h1>Build The Community Your Fans Will Love</h1>
          <p>
            Huddle re-imagines the way we build communities. You have a voice, but so does your audience.
            Create connections with your users as you engage in genuine discussion.
          </p>
        </div>

        <a href="/register" class="btn-primary">Register</a>

      </div>
    </section>
  </main>
  <footer class="footer">
    <nav aria-label="Social media">
      <ul>
        <li tabindex="0"><a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a></li>
        <li tabindex="0"><a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a></li>
        <li tabindex="0"><a href="#"aria-label="Instagram"><i class="fab fa-instagram"></i></a></li>
      </ul>
    </nav>
  </footer>


</body>
</html>
